<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EasyCut - Detalhes da Barbearia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
            margin: 20px auto;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 500;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }
        .back-link:hover {
            color: #3b82f6;
        }
        
        /* Seção da Barbearia */
        .barbearia-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            padding: 24px;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .barbearia-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 24px;
            background: rgba(59, 130, 246, 0.2);
            border: 3px solid rgba(59, 130, 246, 0.3);
        }
        .barbearia-info h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 8px 0;
        }
        .barbearia-meta {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .barbearia-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fbbf24;
            font-weight: 600;
            margin-top: 8px;
        }
        
        /* Seções de Informação */
        .info-section {
            margin-bottom: 24px;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-section h3 {
            color: #e2e8f0;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-section p {
            color: #94a3b8;
            margin: 8px 0;
            line-height: 1.6;
        }
        
        /* Serviços */
        .services-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .service-tag {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(59, 130, 246, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .service-tag:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }
        .service-tag.selected {
            background: rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
            color: #fff;
        }
        
        /* Horários */
        .hours-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .hour-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hour-item.closed {
            opacity: 0.5;
            text-decoration: line-through;
        }
        .hour-item.today {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        /* Sistema de Agendamento */
        .scheduling-section {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .scheduling-section h3 {
            color: #10b981;
        }
        
        .date-picker {
            margin-bottom: 20px;
        }
        .date-picker label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
        }
        .date-picker input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            cursor: pointer;
        }
        
        .date-picker input::-webkit-calendar-picker-indicator {
            display: none;
        }
        
        .date-picker input::-moz-calendar-picker-indicator {
            display: none;
        }
        .date-picker input:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .time-slot {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .time-slot:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .time-slot.selected {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #10b981;
            font-weight: 600;
        }
        .time-slot.unavailable {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        
        /* Botões */
        .btn {
            width: 100%;
            padding: 16px 0;
            margin: 16px 0;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.1);
            border-color: rgba(148, 163, 184, 0.5);
            color: #fff;
        }
        
        /* Avaliações */
        .reviews-section {
            margin-top: 20px;
        }
        .review-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .review-author {
            font-weight: 600;
            color: #e2e8f0;
        }
        .review-rating {
            color: #fbbf24;
            font-size: 0.9rem;
        }
        .review-text {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        /* Galeria de Fotos */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .photo-item {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .photo-item:hover {
            transform: scale(1.05);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Loading e Error */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        /* Modal de Confirmação */
        .confirmation-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .confirmation-content {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .confirmation-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            animation: bounce 0.6s ease;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        
        .confirmation-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 16px;
        }
        
        .confirmation-details {
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .confirmation-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .confirmation-detail:last-child {
            margin-bottom: 0;
            font-weight: 600;
            color: #10b981;
            border-top: 1px solid rgba(16, 185, 129, 0.2);
            padding-top: 8px;
        }
        
        .confirmation-close {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .confirmation-close:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 28px;
                border-radius: 20px;
                max-width: 380px;
            }
            .barbearia-header {
                flex-direction: column;
                text-align: center;
            }
            .barbearia-image {
                margin-right: 0;
                margin-bottom: 16px;
            }
            .hours-grid {
                grid-template-columns: 1fr;
            }
            .time-slots {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 5px;
                max-width: calc(100vw - 10px);
            }
            .logo {
                font-size: 1.6rem;
            }
            .barbearia-info h1 {
                font-size: 1.4rem;
            }
            .time-slots {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="VisualizarBarbearias.html" class="back-link">
            ← Voltar para barbearias
        </a>
        
        <div class="header">
            <div class="logo">EasyCut</div>
            <div class="subtitle">Detalhes da Barbearia</div>
        </div>

        <div id="barbeariaContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Carregando detalhes da barbearia...</div>
            </div>
        </div>
    </div>

    <script>
        class BarbeariaDetalhes {
            constructor() {
                this.barbeariaContent = document.getElementById('barbeariaContent');
                this.barbeariaId = this.getBarbeariaIdFromUrl();
                this.selectedServices = [];
                this.selectedDate = null;
                this.selectedTime = null;
                this.barbeariaData = null;
                
                this.init();
            }

            init() {
                if (this.barbeariaId) {
                    this.loadBarbeariaDetails();
                } else {
                    this.showError('ID da barbearia não encontrado.');
                }
                
                // Adicionar evento de clique para o campo de data
                setTimeout(() => {
                    this.setupDatePicker();
                }, 100);
            }

            getBarbeariaIdFromUrl() {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('id');
            }

            setupDatePicker() {
                const dateInput = document.getElementById('appointmentDate');
                if (dateInput) {
                    // Garantir que o campo seja clicável
                    dateInput.addEventListener('click', () => {
                        dateInput.showPicker();
                    });
                    
                    // Adicionar evento de foco para abrir o calendário
                    dateInput.addEventListener('focus', () => {
                        dateInput.showPicker();
                    });
                }
            }

            async loadBarbeariaDetails() {
                try {
                    const response = await fetch(`http://localhost:5001/api/barbearias/${this.barbeariaId}`);
                    const data = await response.json();

                    if (data.success) {
                        this.barbeariaData = data.barbearia;
                        this.displayBarbeariaDetails(data.barbearia);
                    } else {
                        throw new Error(data.message);
                    }

                } catch (error) {
                    console.error('Erro ao carregar detalhes:', error);
                    // Fallback para dados mock
                    this.displayMockBarbearia();
                }
            }

            displayBarbeariaDetails(barbearia) {
                this.barbeariaContent.innerHTML = `
                    <div class="barbearia-header">
                        <img src="${barbearia.photos?.[0] || 'https://via.placeholder.com/100x100/3b82f6/ffffff?text=B'}" 
                             alt="${barbearia.name}" class="barbearia-image">
                        <div class="barbearia-info">
                            <h1>${barbearia.name}</h1>
                            <div class="barbearia-meta">📍 ${barbearia.address}</div>
                            <div class="barbearia-meta">${barbearia.distance ? `${barbearia.distance.toFixed(1)} km de distância` : ''}</div>
                            <div class="barbearia-rating">
                                ⭐ ${barbearia.rating} 
                                ${this.getPriceLevelText(barbearia.price_level)}
                            </div>
                        </div>
                    </div>

                    <div class="info-section">
                        <h3>📝 Sobre a Barbearia</h3>
                        <p>${barbearia.description || 'Barbearia tradicional com mais de 10 anos de experiência no mercado. Oferecemos serviços de qualidade com profissionais especializados em cortes modernos e clássicos.'}</p>
                    </div>

                    <div class="info-section">
                        <h3>✂️ Serviços Oferecidos</h3>
                        <p>Selecione os serviços que deseja agendar:</p>
                        <div class="services-list">
                            ${barbearia.services.map(service => 
                                `<span class="service-tag" onclick="barbeariaDetalhes.toggleService('${service}')" title="Clique para selecionar">${service}</span>`
                            ).join('')}
                        </div>
                        <div class="price-info" style="margin-top: 16px; padding: 12px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.3);">
                            <p style="margin: 0; color: #10b981; font-size: 0.9rem;">
                                💰 <strong>Preços:</strong> ${this.getPriceLevelText(barbearia.price_level)} - 
                                Valores variam conforme o serviço selecionado
                            </p>
                        </div>
                    </div>

                    <div class="info-section">
                        <h3>🕒 Horários de Funcionamento</h3>
                        <div class="hours-grid">
                            ${this.renderOpeningHours(barbearia.opening_hours)}
                        </div>
                    </div>

                    <div class="info-section scheduling-section">
                        <h3>📅 Agendar Horário</h3>
                        
                        <div class="date-picker">
                            <label for="appointmentDate">Selecione a data:</label>
                            <input type="date" id="appointmentDate" min="${this.getMinDate()}" max="${this.getMaxDate()}" onchange="barbeariaDetalhes.selectDate(this.value)">
                        </div>

                        <div id="timeSlotsContainer" style="display: none;">
                            <label>Horários disponíveis:</label>
                            <div class="time-slots" id="timeSlots">
                                <!-- Horários serão carregados dinamicamente -->
                            </div>
                        </div>

                        <div id="selectedServicesSummary" style="display: none; margin-top: 20px; padding: 16px; background: rgba(59, 130, 246, 0.1); border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.3);">
                            <h4 style="margin: 0 0 12px 0; color: #3b82f6;">📋 Resumo do Agendamento</h4>
                            <div id="servicesList"></div>
                            <div id="totalPrice" style="margin-top: 12px; font-size: 1.1rem; font-weight: 600; color: #10b981;"></div>
                        </div>
                    </div>

                    <div class="info-section">
                        <h3>📞 Contato</h3>
                        ${barbearia.phone ? `<p><strong>📞 Telefone:</strong> ${barbearia.phone}</p>` : ''}
                        ${barbearia.email ? `<p><strong>📧 Email:</strong> ${barbearia.email}</p>` : ''}
                        ${barbearia.website ? `<p><strong>🌐 Website:</strong> <a href="${barbearia.website}" target="_blank" style="color: #3b82f6;">${barbearia.website}</a></p>` : ''}
                        ${barbearia.whatsapp ? `<p><strong>💬 WhatsApp:</strong> <a href="https://wa.me/${barbearia.whatsapp}" target="_blank" style="color: #25D366;">${barbearia.whatsapp}</a></p>` : ''}
                    </div>

                    ${barbearia.photos && barbearia.photos.length > 1 ? `
                    <div class="info-section">
                        <h3>📸 Galeria de Fotos</h3>
                        <div class="photos-grid">
                            ${barbearia.photos.map(photo => 
                                `<div class="photo-item" onclick="barbeariaDetalhes.openPhotoModal('${photo}')">
                                    <img src="${photo}" alt="Foto da barbearia">
                                </div>`
                            ).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <div class="info-section">
                        <h3>⭐ Avaliações</h3>
                        <div class="reviews-section">
                            ${this.renderReviews(barbearia.reviews)}
                        </div>
                    </div>

                    <button class="btn btn-primary" id="scheduleButton" onclick="barbeariaDetalhes.confirmSchedule()" disabled>
                        <span>📅</span> Confirmar Agendamento
                    </button>
                    
                    <button class="btn btn-secondary" onclick="barbeariaDetalhes.compartilharBarbearia()">
                        <span>📤</span> Compartilhar Barbearia
                    </button>
                `;
                
                // Configurar o campo de data após renderizar
                setTimeout(() => {
                    this.setupDatePicker();
                }, 100);
            }

            displayMockBarbearia() {
                // Dados das barbearias fictícias baseadas na página VisualizarBarbearias.html
                const mockBarbearias = {
                    1: {
                        id: 1,
                        name: "Barber King",
                        address: "Rua das Flores, 123, Centro, Ipatinga - MG",
                        phone: "(31) 99999-9999",
                        email: "contato@barberking.com",
                        website: "https://barberking.com",
                        whatsapp: "5531999999999",
                        rating: 4.8,
                        price_level: 2,
                        distance: 0.8,
                        description: "Barbearia premium com mais de 15 anos de experiência no mercado. Especializada em cortes modernos e tratamentos exclusivos. Ambiente sofisticado com profissionais altamente qualificados e atendimento personalizado de primeira qualidade.",
                        opening_hours: {

            getPriceLevelText(priceLevel) {
                const levels = {
                    1: "($ - Econômico)",
                    2: "($$ - Moderado)",
                    3: "($$$ - Caro)",
                    4: "($$$$ - Muito caro)"
                };
                return levels[priceLevel] || "";
            }

            renderOpeningHours(hours) {
                const days = {
                    "monday": "Segunda-feira",
                    "tuesday": "Terça-feira",
                    "wednesday": "Quarta-feira",
                    "thursday": "Quinta-feira",
                    "friday": "Sexta-feira",
                    "saturday": "Sábado",
                    "sunday": "Domingo"
                };

                const today = new Date().toLocaleDateString('pt-BR', { weekday: 'long' }).toLowerCase();
                const todayKey = Object.keys(days).find(key => days[key].toLowerCase().includes(today.split('-')[0]));

                return Object.entries(hours).map(([day, schedule]) => {
                    const dayName = days[day];
                    const isToday = day === todayKey;
                    const className = schedule.closed ? 'closed' : (isToday ? 'today' : '');
                    
                    if (schedule.closed) {
                        return `<div class="hour-item ${className}">${dayName}: Fechado</div>`;
                    } else {
                        return `<div class="hour-item ${className}">${dayName}: ${schedule.open} - ${schedule.close}</div>`;
                    }
                }).join('');
            }

            renderReviews(reviews) {
                if (!reviews || reviews.length === 0) {
                    return '<p>Nenhuma avaliação disponível ainda.</p>';
                }

                return reviews.map(review => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-author">${review.author}</span>
                            <span class="review-rating">⭐ ${review.rating}</span>
                        </div>
                        <div class="review-text">${review.text}</div>
                    </div>
                `).join('');
            }

            toggleService(serviceName) {
                const serviceElement = event.target;
                const index = this.selectedServices.indexOf(serviceName);
                
                if (index > -1) {
                    this.selectedServices.splice(index, 1);
                    serviceElement.classList.remove('selected');
                } else {
                    this.selectedServices.push(serviceName);
                    serviceElement.classList.add('selected');
                }
                
                this.updateServicesSummary();
                this.updateScheduleButton();
            }

            getMinDate() {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                return tomorrow.toISOString().split('T')[0];
            }

            getMaxDate() {
                const maxDate = new Date();
                maxDate.setDate(maxDate.getDate() + 30);
                return maxDate.toISOString().split('T')[0];
            }

            selectDate(date) {
                this.selectedDate = date;
                this.selectedTime = null;
                this.loadTimeSlots(date);
                this.updateScheduleButton();
            }

            loadTimeSlots(date) {
                const timeSlotsContainer = document.getElementById('timeSlotsContainer');
                const timeSlots = document.getElementById('timeSlots');
                
                if (!date) {
                    timeSlotsContainer.style.display = 'none';
                    return;
                }

                // Simular horários disponíveis baseados no dia da semana
                const selectedDate = new Date(date);
                const dayOfWeek = selectedDate.getDay();
                const dayName = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'][dayOfWeek];
                
                const openingHours = this.barbeariaData.opening_hours[dayName];
                
                if (!openingHours || openingHours.closed) {
                    timeSlots.innerHTML = '<p style="color: #fca5a5; text-align: center;">Barbearia fechada neste dia</p>';
                    timeSlotsContainer.style.display = 'block';
                    return;
                }

                const slots = this.generateTimeSlots(openingHours.open, openingHours.close);
                
                timeSlots.innerHTML = slots.map(slot => `
                    <div class="time-slot ${slot.available ? '' : 'unavailable'}" 
                         onclick="${slot.available ? `barbeariaDetalhes.selectTime('${slot.time}')` : ''}">
                        ${slot.time}
                    </div>
                `).join('');
                
                timeSlotsContainer.style.display = 'block';
            }

            generateTimeSlots(openTime, closeTime) {
                const slots = [];
                const openHour = parseInt(openTime.split(':')[0]);
                const openMinute = parseInt(openTime.split(':')[1]);
                const closeHour = parseInt(closeTime.split(':')[0]);
                const closeMinute = parseInt(closeTime.split(':')[1]);
                
                const startTime = openHour * 60 + openMinute;
                const endTime = closeHour * 60 + closeMinute;
                
                for (let time = startTime; time < endTime; time += 30) {
                    const hour = Math.floor(time / 60);
                    const minute = time % 60;
                    const timeString = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                    
                    // Simular alguns horários ocupados
                    const isAvailable = Math.random() > 0.3;
                    
                    slots.push({
                        time: timeString,
                        available: isAvailable
                    });
                }
                
                return slots;
            }

            selectTime(time) {
                // Remover seleção anterior
                document.querySelectorAll('.time-slot').forEach(slot => {
                    slot.classList.remove('selected');
                });
                
                // Selecionar novo horário
                event.target.classList.add('selected');
                this.selectedTime = time;
                this.updateScheduleButton();
            }

            updateServicesSummary() {
                const summaryContainer = document.getElementById('selectedServicesSummary');
                const servicesList = document.getElementById('servicesList');
                const totalPrice = document.getElementById('totalPrice');
                
                if (this.selectedServices.length === 0) {
                    summaryContainer.style.display = 'none';
                    return;
                }
                
                summaryContainer.style.display = 'block';
                
                const prices = this.getServicePrices();
                let total = 0;
                
                const servicesHtml = this.selectedServices.map(service => {
                    const price = prices[service] || 20;
                    total += price;
                    return `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; padding: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 8px;">
                            <span>✂️ ${service}</span>
                            <span style="color: #10b981; font-weight: 600;">R$ ${price.toFixed(2)}</span>
                        </div>
                    `;
                }).join('');
                
                servicesList.innerHTML = servicesHtml;
                totalPrice.innerHTML = `💰 <strong>Total: R$ ${total.toFixed(2)}</strong>`;
            }

            updateScheduleButton() {
                const scheduleButton = document.getElementById('scheduleButton');
                const canSchedule = this.selectedServices.length > 0 && this.selectedDate && this.selectedTime;
                
                scheduleButton.disabled = !canSchedule;
                
                if (canSchedule) {
                    const totalPrice = this.calculateTotalPrice();
                    scheduleButton.innerHTML = `<span>📅</span> Agendar - ${this.selectedServices.join(', ')} - R$ ${totalPrice}`;
                } else {
                    scheduleButton.innerHTML = '<span>📅</span> Confirmar Agendamento';
                }
            }

            confirmSchedule() {
                if (!this.selectedServices.length || !this.selectedDate || !this.selectedTime) {
                    alert('Por favor, selecione pelo menos um serviço, uma data e um horário.');
                    return;
                }

                const scheduleData = {
                    barbeariaId: this.barbeariaId,
                    barbeariaName: this.barbeariaData.name,
                    services: this.selectedServices,
                    date: this.selectedDate,
                    time: this.selectedTime,
                    totalPrice: this.calculateTotalPrice()
                };

                // Salvar no localStorage para simular agendamento
                const existingAppointments = JSON.parse(localStorage.getItem('appointments') || '[]');
                existingAppointments.push({
                    id: Date.now(),
                    ...scheduleData,
                    status: 'pending'
                });
                localStorage.setItem('appointments', JSON.stringify(existingAppointments));

                const totalPrice = this.calculateTotalPrice();
                const formattedDate = new Date(this.selectedDate).toLocaleDateString('pt-BR');
                this.showConfirmationModal(formattedDate, totalPrice);
                
                // Resetar seleções
                this.selectedServices = [];
                this.selectedDate = null;
                this.selectedTime = null;
                document.querySelectorAll('.service-tag').forEach(tag => tag.classList.remove('selected'));
                document.getElementById('appointmentDate').value = '';
                document.getElementById('timeSlotsContainer').style.display = 'none';
                document.getElementById('selectedServicesSummary').style.display = 'none';
                this.updateScheduleButton();
            }

            getServicePrices() {
                // Preços variados baseados no nível da barbearia
                const priceLevels = {
                    1: { // Econômico
                        'Corte masculino': 15,
                        'Barba': 10,
                        'Sobrancelha': 8,
                        'Relaxamento': 20
                    },
                    2: { // Moderado
                        'Design de sobrancelhas': 25,
                        'Barboterapia': 20,
                        'Pigmentação': 40,
                        'Relaxamento': 30,
                        'Progressivas': 35,
                        'Limpeza de pele': 25,
                        'Massagem facial': 35,
                        'Toalha quente': 15,
                        'Corte masculino': 25,
                        'Barba': 15,
                        'Sobrancelha': 12
                    },
                    3: { // Caro
                        'Corte': 40,
                        'Barba': 25,
                        'Design de sobrancelhas': 30,
                        'Massagem': 50,
                        'Tratamentos': 60
                    }
                };

                return priceLevels[this.barbeariaData.price_level] || priceLevels[2];
            }

            calculateTotalPrice() {
                const prices = this.getServicePrices();
                
                return this.selectedServices.reduce((total, service) => {
                    return total + (prices[service] || 20);
                }, 0);
            }

            openPhotoModal(photoUrl) {
                // Implementar modal de fotos se necessário
                window.open(photoUrl, '_blank');
            }

            compartilharBarbearia() {
                const shareData = {
                    title: `${this.barbeariaData.name} - EasyCut`,
                    text: `Confira esta barbearia no EasyCut! ${this.barbeariaData.description}`,
                    url: window.location.href
                };

                if (navigator.share) {
                    navigator.share(shareData);
                } else {
                    // Fallback para copiar URL
                    navigator.clipboard.writeText(window.location.href).then(() => {
                        alert('Link copiado para a área de transferência!');
                    });
                }
            }

            showError(message) {
                this.barbeariaContent.innerHTML = `
                    <div class="error-message">${message}</div>
                `;
            }

            showSuccess(message) {
                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.textContent = message;
                
                this.barbeariaContent.insertBefore(successDiv, this.barbeariaContent.firstChild);
                
                setTimeout(() => {
                    successDiv.remove();
                }, 5000);
            }

            showConfirmationModal(formattedDate, totalPrice) {
                const modal = document.createElement('div');
                modal.className = 'confirmation-modal';
                modal.innerHTML = `
                    <div class="confirmation-content">
                        <div class="confirmation-icon">✅</div>
                        <div class="confirmation-title">Agendamento Confirmado!</div>
                        
                        <div class="confirmation-details">
                            <div class="confirmation-detail">
                                <span>🏪 Barbearia:</span>
                                <span>${this.barbeariaData.name}</span>
                            </div>
                            <div class="confirmation-detail">
                                <span>📅 Data:</span>
                                <span>${formattedDate}</span>
                            </div>
                            <div class="confirmation-detail">
                                <span>🕐 Horário:</span>
                                <span>${this.selectedTime}</span>
                            </div>
                            <div class="confirmation-detail">
                                <span>✂️ Serviços:</span>
                                <span>${this.selectedServices.join(', ')}</span>
                            </div>
                            <div class="confirmation-detail">
                                <span>💰 Total:</span>
                                <span>R$ ${totalPrice.toFixed(2)}</span>
                            </div>
                        </div>
                        
                        <p style="color: #94a3b8; font-size: 0.9rem; margin: 16px 0;">
                            📞 Você receberá uma confirmação por WhatsApp em breve.
                        </p>
                        
                        <button class="confirmation-close" onclick="barbeariaDetalhes.closeConfirmationModal()">
                            Fechar
                        </button>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Fechar modal ao clicar fora
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        this.closeConfirmationModal();
                    }
                });
                
                // Fechar modal com ESC
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closeConfirmationModal();
                    }
                });
            }

            closeConfirmationModal() {
                const modal = document.querySelector('.confirmation-modal');
                if (modal) {
                    modal.remove();
                }
            }
        }
