<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EasyCut - Editar Perfil Cliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            margin: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }
        
        .back-link:hover {
            color: #10b981;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 0.95rem;
        }
        
        .required {
            color: #ef4444;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        input::placeholder {
            color: #64748b;
        }
        
        .btn {
            width: 100%;
            padding: 16px 0;
            margin: 24px 0 16px 0;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.1);
            border-color: rgba(148, 163, 184, 0.5);
            color: #fff;
        }
        
        .info-text {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 4px;
            font-style: italic;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 28px;
                border-radius: 20px;
                max-width: 380px;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .logo {
                font-size: 1.9rem;
            }
            
            .subtitle {
                font-size: 0.95rem;
            }
            
            .btn {
                padding: 14px 0;
                font-size: 1.05rem;
            }
        }
        
        @media (max-width: 600px) {
            .container {
                margin: 8px;
                padding: 24px;
                max-width: calc(100vw - 16px);
            }
            
            .logo {
                font-size: 1.7rem;
            }
            
            .form-group {
                margin-bottom: 18px;
            }
            
            input {
                padding: 12px 14px;
                font-size: 0.98rem;
            }
            
            .btn {
                padding: 14px 0;
                margin: 20px 0 14px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link" onclick="return confirmVoltar()">
            ← Voltar
        </a>
        
        <div class="header">
            <div class="logo">EasyCut</div>
            <div class="subtitle">Editar Perfil - Cliente</div>
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <form id="editProfileForm">
            <!-- Informações Pessoais -->
            <div class="form-group">
                <label for="nomeCompleto">Nome Completo <span class="required">*</span></label>
                <input type="text" id="nomeCompleto" name="nomeCompleto" placeholder="Digite seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                <div class="info-text">Este é seu login para acessar o sistema</div>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone / WhatsApp <span class="required">*</span></label>
                <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
                <div class="info-text">Para contato e agendamentos</div>
            </div>

            <!-- Senha Atual -->
            <div class="form-group">
                <label for="senhaAtual">Senha Atual <span class="required">*</span></label>
                <input type="password" id="senhaAtual" name="senhaAtual" placeholder="Digite sua senha atual" required>
                <div class="info-text">Necessária para confirmar as alterações</div>
            </div>

            <!-- Nova Senha (Opcional) -->
            <div class="form-row">
                <div class="form-group">
                    <label for="novaSenha">Nova Senha</label>
                    <input type="password" id="novaSenha" name="novaSenha" placeholder="Deixe em branco para manter">
                </div>
                <div class="form-group">
                    <label for="confirmarNovaSenha">Confirmar Nova Senha</label>
                    <input type="password" id="confirmarNovaSenha" name="confirmarNovaSenha" placeholder="Confirme a nova senha">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='ClienteDashboard.html'">Cancelar</button>
        </form>
    </div>

    <script>
        // Função para confirmar se o usuário quer voltar
        function confirmVoltar() {
            const form = document.getElementById('editProfileForm');
            const formData = new FormData(form);
            let hasChanges = false;
            
            // Verifica se há alterações no formulário
            const originalData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (formData.get('nomeCompleto') !== originalData.nomeCompleto ||
                formData.get('email') !== originalData.email ||
                formData.get('telefone') !== originalData.telefone ||
                formData.get('novaSenha')) {
                hasChanges = true;
            }
            
            if (hasChanges) {
                return confirm('Você tem certeza que deseja voltar? As alterações não salvas serão perdidas.');
            }
            return true;
        }

        // Validação de telefone
        function formatPhone(value) {
            return value.replace(/\D/g, '').replace(/(\d{2})(\d{4,5})(\d{4})/, '($1) $2-$3');
        }

        function validatePhoneInput(input) {
            const phoneRegex = /^(\+55\s?)?(\(?[1-9]{2}\)?)\s?([0-9]{4,5})\-?([0-9]{4})$/;
            const cleaned = input.value.replace(/\D/g, '');
            
            if (input.value && !phoneRegex.test(input.value) && !input.value.startsWith('+55')) {
                input.style.borderColor = '#ef4444';
                input.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.1)';
                return false;
            } else if (cleaned.length < 10) {
                input.style.borderColor = '#ef4444';
                input.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.1)';
                return false;
            } else {
                input.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                input.style.boxShadow = 'none';
                return true;
            }
        }

        // Validação de nome completo
        function validateFullName(name) {
            const nameParts = name.trim().split(' ');
            return nameParts.length >= 2 && nameParts.every(part => part.length > 0);
        }

        // Mostrar mensagens
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            document.getElementById('errorMessage').style.display = 'none';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            document.getElementById('successMessage').style.display = 'none';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Carregar dados do usuário
        function loadUserData() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (currentUser.nomeCompleto) {
                document.getElementById('nomeCompleto').value = currentUser.nomeCompleto;
            }
            if (currentUser.email) {
                document.getElementById('email').value = currentUser.email;
            }
            if (currentUser.telefone) {
                document.getElementById('telefone').value = currentUser.telefone;
            }
        }

        // Event listeners
        document.getElementById('telefone').addEventListener('input', function(e) {
            e.target.value = formatPhone(e.target.value);
        });

        document.getElementById('telefone').addEventListener('blur', function(e) {
            validatePhoneInput(e.target);
        });

        // Validação do formulário
        document.getElementById('editProfileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nomeCompleto = document.getElementById('nomeCompleto').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const senhaAtual = document.getElementById('senhaAtual').value;
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarNovaSenha = document.getElementById('confirmarNovaSenha').value;
            
            // Validação do nome completo
            if (!validateFullName(nomeCompleto)) {
                showError('Por favor, digite seu nome completo (nome e sobrenome).');
                return;
            }
            
            // Validação do email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Por favor, digite um e-mail válido.');
                return;
            }
            
            // Validação do telefone
            if (!validatePhoneInput(document.getElementById('telefone'))) {
                showError('Por favor, digite um telefone válido.');
                return;
            }
            
            // Validação da senha atual
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (senhaAtual !== currentUser.senha) {
                showError('Senha atual incorreta.');
                return;
            }
            
            // Validação da nova senha se fornecida
            if (novaSenha) {
                if (novaSenha.length < 8) {
                    showError('A nova senha deve ter pelo menos 8 caracteres.');
                    return;
                }
                
                if (novaSenha !== confirmarNovaSenha) {
                    showError('As senhas não coincidem!');
                    return;
                }
            }
            
            // Mostrar loading
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvando...';
            
            try {
                // Simular atualização dos dados
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Atualizar dados do usuário
                const updatedUser = {
                    ...currentUser,
                    nomeCompleto: nomeCompleto,
                    email: email,
                    telefone: telefone,
                    senha: novaSenha || currentUser.senha,
                    tipo: 'cliente',
                    lastUpdate: new Date().toISOString()
                };
                
                // Atualizar localStorage
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                localStorage.setItem('userName', nomeCompleto);
                
                // Atualizar lista de usuários
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.email === currentUser.email);
                if (userIndex !== -1) {
                    users[userIndex] = updatedUser;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                
                showSuccess('Perfil atualizado com sucesso!');
                
                // Limpar campos de senha
                document.getElementById('senhaAtual').value = '';
                document.getElementById('novaSenha').value = '';
                document.getElementById('confirmarNovaSenha').value = '';
                
                // Redirecionar após 2 segundos
                setTimeout(() => {
                    window.location.href = 'ClienteDashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Erro ao atualizar perfil:', error);
                showError('Erro ao atualizar perfil. Tente novamente.');
            } finally {
                // Restaurar botão
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Validação em tempo real do nome
        document.getElementById('nomeCompleto').addEventListener('blur', function(e) {
            if (e.target.value && !validateFullName(e.target.value)) {
                e.target.style.borderColor = '#ef4444';
                e.target.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.1)';
            } else {
                e.target.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                e.target.style.boxShadow = 'none';
            }
        });

        // Carregar dados quando a página carregar
        document.addEventListener('DOMContentLoaded', function() {
            loadUserData();
        });
    </script>
</body>
</html>
